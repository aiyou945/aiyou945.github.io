<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>呆头机哥 · 个人主页</title>
    <!-- 引入 Font Awesome 图标库 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />
    <style>
        /* ===== 全局重置 & 字体 ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', 'PingFang SC', Roboto, system-ui, -apple-system, sans-serif;
            background: linear-gradient(145deg, #f9f5e8 0%, #f0ebe0 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 2rem 1.5rem;
            margin: 0;
        }

        /* ===== 主卡片容器 ===== */
        .profile-card {
            max-width: 820px;
            width: 100%;
            background: rgba(255, 251, 240, 0.85);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-radius: 48px;
            padding: 3rem 2.8rem;
            box-shadow:
                0 30px 60px -20px rgba(0, 0, 0, 0.25),
                0 10px 30px -10px rgba(0, 0, 0, 0.08),
                inset 0 1px 0 rgba(255, 255, 255, 0.6);
            border: 1px solid rgba(255, 245, 220, 0.5);
            transition: transform 0.3s ease, box-shadow 0.4s ease;
        }

        .profile-card:hover {
            transform: translateY(-4px);
            box-shadow:
                0 40px 80px -24px rgba(0, 0, 0, 0.30),
                0 12px 36px -12px rgba(0, 0, 0, 0.10);
        }

        /* ===== 头部区域（已移除头像） ===== */
        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 2.2rem;
            flex-wrap: wrap;
        }

        .title-group {
            flex: 1;
        }

        .title-group h1 {
            font-size: 2.2rem;
            font-weight: 700;
            letter-spacing: -0.5px;
            color: #2d241a;
            background: linear-gradient(135deg, #4a3520, #7a5a3a);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            line-height: 1.2;
            display: inline-block;
        }

        /* 括号内的名字样式 */
        .title-group h1 .name-tag {
            font-weight: 400;
            font-size: 1.2rem;
            color: #7a6a5a;
            -webkit-text-fill-color: #7a6a5a;
            background: none;
        }

        .title-group .subhead {
            font-size: 1rem;
            color: #7a6a5a;
            font-weight: 400;
            letter-spacing: 0.3px;
            margin-top: 0.1rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .title-group .subhead i {
            color: #d4a373;
            font-size: 0.85rem;
        }

        /* ===== 分割装饰 ===== */
        .divider {
            width: 100%;
            height: 2px;
            background: linear-gradient(90deg, transparent, #dcc9b0, #d4a373, #dcc9b0, transparent);
            margin: 1.8rem 0 2.2rem 0;
            border-radius: 4px;
            opacity: 0.6;
        }

        /* ===== 区块标题 ===== */
        .section-title {
            font-size: 1.25rem;
            font-weight: 600;
            color: #3d2e1e;
            display: flex;
            align-items: center;
            gap: 0.7rem;
            margin-bottom: 1.4rem;
            letter-spacing: -0.3px;
        }

        .section-title i {
            color: #d4a373;
            font-size: 1.2rem;
            width: 1.8rem;
            text-align: center;
        }

        /* ===== 链接网格 ===== */
        .link-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(210px, 1fr));
            gap: 1rem;
            margin-bottom: 2rem;
        }

        .link-card {
            background: rgba(255, 248, 235, 0.7);
            backdrop-filter: blur(4px);
            -webkit-backdrop-filter: blur(4px);
            border-radius: 18px;
            padding: 1rem 1.4rem;
            display: flex;
            align-items: center;
            gap: 0.9rem;
            border: 1px solid rgba(215, 190, 160, 0.25);
            transition: all 0.25s ease;
            text-decoration: none;
            color: #3d2e1e;
            font-weight: 500;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.02);
        }

        .link-card:hover {
            background: rgba(255, 245, 225, 0.9);
            border-color: #d4a373;
            transform: translateY(-3px) scale(1.01);
            box-shadow: 0 12px 28px -10px rgba(180, 130, 80, 0.20);
        }

        .link-card .icon-wrap {
            width: 38px;
            height: 38px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            color: #fff;
            flex-shrink: 0;
            transition: transform 0.2s;
        }

        .link-card:hover .icon-wrap {
            transform: scale(1.05);
        }

        /* 各平台图标配色 */
        .icon-douyin {
            background: linear-gradient(135deg, #000000, #1a1a1a);
        }
        .icon-csdn {
            background: linear-gradient(135deg, #fc4a1a, #f57c00);
        }
        .icon-qq {
            background: linear-gradient(135deg, #2b82d9, #1a6bc4);
        }
        /* 洛谷改为绿色渐变 + 奖杯图标 */
        .icon-luogu {
            background: linear-gradient(135deg, #2e8b57, #1f6d3a);
        }
        .icon-hydro {
            background: linear-gradient(135deg, #00b4d8, #0077b6);
        }
        .icon-github {
            background: linear-gradient(135deg, #24292e, #0d1117);
        }
        .icon-aiyou {
            background: linear-gradient(135deg, #6c5ce7, #a29bfe);
        }

        .link-card .link-text {
            display: flex;
            flex-direction: column;
            line-height: 1.3;
        }

        .link-card .link-text .label {
            font-size: 0.95rem;
            font-weight: 600;
            color: #2d241a;
        }

        .link-card .link-text .hint {
            font-size: 0.7rem;
            font-weight: 400;
            color: #9a8a7a;
            letter-spacing: 0.2px;
        }

        .link-card .link-text .hint i {
            margin-right: 3px;
            font-size: 0.6rem;
        }

        /* ===== QQ 特殊展示 ===== */
        .qq-display {
            background: rgba(255, 248, 235, 0.6);
            border-radius: 18px;
            padding: 0.9rem 1.6rem;
            display: inline-flex;
            align-items: center;
            gap: 1rem;
            border: 1px solid rgba(215, 190, 160, 0.2);
            font-size: 1rem;
            color: #3d2e1e;
            margin-top: 0.2rem;
            backdrop-filter: blur(4px);
            -webkit-backdrop-filter: blur(4px);
        }

        .qq-display i {
            color: #2b82d9;
            font-size: 1.3rem;
        }

        .qq-display .qq-number {
            font-weight: 600;
            letter-spacing: 1px;
            color: #1f1a14;
            font-size: 1.1rem;
        }

        /* ===== 朋友专区 ===== */
        .friends-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 0.9rem;
            margin: 1rem 0 0.6rem 0;
        }

        .friend-item {
            background: rgba(250, 242, 230, 0.5);
            border-radius: 14px;
            padding: 0.7rem 1.2rem;
            display: flex;
            align-items: center;
            gap: 0.7rem;
            border: 1px solid rgba(200, 175, 145, 0.15);
            transition: all 0.2s ease;
            text-decoration: none;
            color: #4a3a2a;
            font-weight: 500;
            font-size: 0.95rem;
        }

        .friend-item:hover {
            background: rgba(245, 235, 215, 0.8);
            border-color: #c9ad8a;
            transform: translateY(-2px);
            box-shadow: 0 6px 16px -8px rgba(120, 80, 40, 0.15);
        }

        .friend-item .badge {
            display: inline-block;
            padding: 0.15rem 0.6rem;
            border-radius: 30px;
            font-size: 0.6rem;
            font-weight: 600;
            letter-spacing: 0.3px;
            background: #e8ddd0;
            color: #6a5a4a;
        }

        .friend-item i {
            color: #b89570;
            font-size: 0.9rem;
            width: 1.2rem;
            text-align: center;
        }

        /* ===== 底部状态 ===== */
        .footer-note {
            margin-top: 2.8rem;
            padding-top: 1.8rem;
            border-top: 1px dashed rgba(190, 165, 135, 0.3);
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 0.8rem;
        }

        .footer-note .status {
            display: flex;
            align-items: center;
            gap: 0.6rem;
            font-size: 0.9rem;
            color: #7a6a5a;
        }

        .footer-note .status .dot {
            display: inline-block;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #7bcfa6;
            animation: pulse-dot 2s infinite;
        }

        @keyframes pulse-dot {
            0%,
            100% {
                opacity: 1;
                transform: scale(1);
            }
            50% {
                opacity: 0.5;
                transform: scale(0.8);
            }
        }

        .footer-note .build-tag {
            font-size: 0.75rem;
            color: #b09a82;
            letter-spacing: 0.5px;
            background: rgba(215, 190, 160, 0.15);
            padding: 0.3rem 1rem;
            border-radius: 30px;
            border: 1px solid rgba(215, 190, 160, 0.1);
        }

        .footer-note .build-tag i {
            margin-right: 4px;
        }

        /* ===== 响应式 ===== */
        @media (max-width: 640px) {
            .profile-card {
                padding: 2rem 1.5rem;
                border-radius: 32px;
            }

            .header {
                flex-direction: column;
                align-items: flex-start;
                gap: 0.8rem;
            }

            .title-group h1 {
                font-size: 1.7rem;
            }

            .title-group h1 .name-tag {
                font-size: 1rem;
            }

            .link-grid {
                grid-template-columns: 1fr;
            }

            .friends-grid {
                grid-template-columns: 1fr;
            }

            .footer-note {
                flex-direction: column;
                align-items: flex-start;
            }

            .qq-display {
                width: 100%;
                justify-content: center;
                padding: 0.8rem;
            }
        }

        @media (max-width: 400px) {
            .profile-card {
                padding: 1.5rem 1rem;
            }
            .title-group h1 {
                font-size: 1.4rem;
            }
        }
    </style>
</head>
<body>

            <div class="friends-grid">

</html>
