    <style>

        }
        /* 卡片容器 */
        .card-wrap {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 24px;
            margin-bottom: 20px;
        }
        .card {

        .card p {

            line-height: 1.6;
            margin-bottom: 16px;
        }
        .card a {
            display: inline-block;
            padding: 9px 18px;
            background: #157878;
            color: #fff;
            text-decoration: none;
            border-radius: 6px;
            transition: background 0.2s;

        .card a:hover {

        /* 联系方式模块 */

        .friend-link a {

            font-weight: 500;
        }
        .friend-link a:hover {
            text-decoration: underline;
        }
        /* 你原有弹窗样式保留优化 */

            top: 0;
            left: 0;
            width: 100%;

            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: #fff;
            padding: 30px;
            border-radius: 8px;

    <script>
        // 1. QQ一键复制功能
        const qqText = document.getElementById('qqText');
        const tip = document.getElementById('tip');
        qqText.addEventListener('click', async () => {
            const text = '2235894707';
            await navigator.clipboard.writeText(text);
            tip.style.opacity = '1';
            setTimeout(() => tip.style.opacity = '0', 1500);
        });

        // 2. 会话存储逻辑：同浏览器打开一次后，本次会话不再进入首页
        // sessionStorage 关闭浏览器自动清空，localStorage永久保存；这里用sessionStorage完美匹配你的需求
        (function(){
            const key = 'homepage_visited';
            // 判断当前会话是否访问过
            if(sessionStorage.getItem(key)){
                // 已访问过，直接跳转编程日常页面
                window.location.href = "https://aiyou945.github.io";
            }else{
                // 首次打开，标记已访问，展示当前首页
                sessionStorage.setItem(key, '1');
            }
        })();
    </script>
