<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>西峰小学六年(2)班同学回忆册</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: "Microsoft YaHei", sans-serif;
    }
    body {
      background: linear-gradient(120deg, #f5f7fa, #e4eaf5);
      min-height: 100vh;
      color: #333;
    }
    .container {
      max-width: 1000px;
      margin: 0 auto;
      padding: 30px 20px;
    }
    .header {
      text-align: center;
      padding: 40px 0;
      color: #2c5282;
    }
    .header h1 {
      font-size: 2.2rem;
      margin-bottom: 10px;
      text-shadow: 1px 1px 3px rgba(0,0,0,0.1);
    }
    .header p {
      font-size: 1.1rem;
      opacity: 0.8;
    }
    .content {
      background: white;
      border-radius: 12px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.08);
      padding: 30px;
      margin-bottom: 20px;
    }
  </style>
</head>
<body>
  <!-- 使用说明：
  1. .container 是页面主容器，所有内容建议放在这个容器内
  2. .header 是标题区域，可修改h1和p标签里的文字
  3. .content 是内容区域，可以在这里添加：
     - 同学照片：<img src="照片路径" alt="描述">
     - 文字内容：<p>回忆文字</p>
     - 班级名单：<ul><li>姓名</li></ul>
     - 毕业寄语：<div>寄语内容</div>
  4. 可重复添加多个<div class="content">来分模块展示不同内容
  -->
  <div class="container">
    <div class="header">
      <h1>六年(2)班同学回忆册</h1>
      <p>珍藏六年时光 · 留存美好回忆</p>
    </div>
    <div class="content">
      <h2>同学签名图片</h2>
      <p>该网页正在开发中，敬请期待！</p>
    </div>
  </div>
</body>
</html>
