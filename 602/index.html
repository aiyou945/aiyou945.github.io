<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>西峰小学六年(2)班同学回忆册</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: "Microsoft YaHei", sans-serif;
    }
    body {
      background: linear-gradient(120deg, #f5f7fa, #e4eaf5);
      min-height: 100vh;
      color: #333;
    }
    a {
      background: blue;
      display: inline-block;
      width: 100px;
      height: 40px;
      text-align: center;
      line-height: 40px;
      text-decoration: none;
      border-radius: 8px;
      color: white;
      margin-top: 30px;
      transition: all 0.3s ease;
    }
    a:hover {
      transform: scale(1.1);
      background: darkblue;
    }
    .container {
      max-width: 1000px;
      margin: 0 auto;
      padding: 30px 20px;
      display: none;
    }
    .header {
      text-align: center;
      padding: 40px 0;
      color: #2c5282;
    }
    .header h1 {
      font-size: 2.2rem;
      margin-bottom: 10px;
      text-shadow: 1px 1px 3px rgba(0,0,0,0.1);
    }
    .header p {
      font-size: 1.1rem;
      opacity: 0.8;
    }
    .content {
      background: white;
      border-radius: 12px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.08);
      padding: 30px;
      margin-bottom: 20px;
    }
  </style>
</head>
<body>
  <!-- 使用说明：
  1. .container 是页面主容器，所有内容建议放在这个容器内
  2. .header 是标题区域，可修改h1和p标签里的文字
  3. .content 是内容区域，可以在这里添加：
     - 同学照片：<img src="照片路径" alt="描述">
     - 文字内容：<p>回忆文字</p>
     - 班级名单：<ul><li>姓名</li></ul>
     - 毕业寄语：<div>寄语内容</div>
  4. 可重复添加多个<div class="content">来分模块展示不同内容
  -->
  <div class="container">
    <div class="header">
      <h1>六年(2)班同学回忆册</h1>
      <p>珍藏六年时光 · 留存美好回忆</p>
    </div>
    <div class="content">
      <h2>测试网站功能</h2>
      <p>如果你能看到这篇帖子，那么恭喜你，你已经成功来到了六年(2)班的同学回忆录！请点开下面的按钮测试网页功能吧！<br /></p>
      <a href="https://aiyou945.github.io/602/test/">查看详情</a>
    </div>
  </div>

  <script>
    function checkPassword() {
      let password = prompt("请输入密码以打开回忆录！");
      if (password === "202002") {
        document.querySelector(".container").style.display = "block";
      }
      else{
        checkPassword();
      }
    }
    checkPassword();
  </script>
</body>
</html>
