    <script>
      function switchVersion(type, event) {
      const tabs = document.querySelectorAll('.version-tab');
      tabs.forEach(tab => tab.classList.remove('active'));
      event.target.classList.add('active');
    
      const allItems = document.querySelectorAll('.download-item');
      const newsItems = document.querySelectorAll('.download-item.news');
      const releaseItems = document.querySelectorAll('.download-item.release');
      const betaItems = document.querySelectorAll('.download-item.beta');
    
      if (type == 'news') {
        allItems.forEach(item => item.style.display = 'none');
        newsItems.forEach(item => item.style.display = 'flex');
      }
      else if (type === 'release') {
        allItems.forEach(item => item.style.display = 'none');
        releaseItems.forEach(item => item.style.display = 'flex');
      } else if (type === 'beta') {
        allItems.forEach(item => item.style.display = 'none');
        betaItems.forEach(item => item.style.display = 'flex');
      }
    }
    </script>
